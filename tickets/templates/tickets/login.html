{% extends 'tickets/base.html' %}

{% block title %}Connexion – EXPERTS ITN{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" 
     style="background: linear-gradient(135deg, #1B4F8A 0%, #2E5FA3 100%);">
    <div class="card p-4" style="width: 400px;">
        
        <div class="text-center mb-4">
            <i class="fas fa-ticket-alt fa-3x text-primary mb-2"></i>
            <h4 class="fw-bold text-dark">EXPERTS ITN</h4>
            <p class="text-muted">Gestion des Tickets IT</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Entrez votre identifiant" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Entrez votre mot de passe" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>

    </div>
</div>
{% endblock %}
